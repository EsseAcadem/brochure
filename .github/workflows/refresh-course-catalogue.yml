name: Refresh provider course catalogue

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'
      timezone: 'Europe/London'

permissions:
  contents: write

concurrency:
  group: refresh-provider-course-catalogue
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install scraper dependencies
        run: python -m pip install --requirement scripts/requirements.txt

      - name: Refresh catalogue
        env:
          PYTHONUNBUFFERED: '1'
        run: python scripts/update_courses.py

      - name: Commit catalogue changes
        shell: bash
        run: |
          if git diff --quiet -- data/knowledge-academy-courses.json; then
            echo "No catalogue changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/knowledge-academy-courses.json
          git commit -m "Refresh provider course catalogue"
          git push
