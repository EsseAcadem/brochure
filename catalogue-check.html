<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catalogue check</title><style>body{font:16px system-ui;margin:40px;max-width:760px}pre{white-space:pre-wrap;background:#f1f5f9;padding:16px;border-radius:10px}</style></head><body><h1>Provider catalogue check</h1><pre id="result">Loading…</pre><script>fetch('./data/knowledge-academy-courses.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(d=>result.textContent=`Success\nCourses: ${d.courseCount || d.courses.length}\nUpdated: ${d.lastUpdated}\nSource: ${d.source}`).catch(e=>result.textContent=`Failed\n${e.message}`);</script></body></html>
